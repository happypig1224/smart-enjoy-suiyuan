smart:
  enjoy:
    suiyuan:
      datasource:
        url: jdbc:mysql://${PROD_MYSQL_HOST}:3306/smart_enjoy_suiyuan?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&requireSSL=true&verifyServerCertificate=true&useServerPrepStmts=true&cachePrepStmts=true
        username: ${PROD_MYSQL_USERNAME}
        password: ${PROD_MYSQL_PASSWORD}
      data:
        redis:
          host: ${PROD_REDIS_HOST}
          port: 6379
          password: ${PROD_REDIS_PASSWORD}
      jwt:
        admin-secret-key: ${PROD_JWT_ADMIN_SECRET_KEY}
        admin-ttl: 7200000
        admin-token-name: admin-token
        user-secret-key: ${PROD_JWT_USER_SECRET_KEY}
        user-ttl: 7200000
        user-token-name: authentication

# 生产环境安全配置
knife4j:
  enable: false

# CORS跨域配置(生产环境需配置具体前端域名)
cors:
  allowed-origins: ${PROD_CORS_ALLOWED_ORIGINS:https://yourdomain.com}

# 安全响应头配置
security:
  headers:
    x-frame-options: DENY
    x-content-type-options: nosniff
    x-xss-protection: "1; mode=block"
    referrer-policy: strict-origin-when-cross-origin
    content-security-policy: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"