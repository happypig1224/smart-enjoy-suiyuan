spring:
  main:
    banner-mode: console
  application:
    name: smart-enjoy-suiyuan
  profiles:
    active: test
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB        # 单个文件最大大小
      max-request-size: 100MB    # 整个请求最大大小
  # MySQL数据库配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: ${smart.enjoy.suiyuan.datasource.driver-class-name}
    url: ${smart.enjoy.suiyuan.datasource.url}
    username: ${smart.enjoy.suiyuan.datasource.username}
    password: ${smart.enjoy.suiyuan.datasource.password}
    druid:
      # 初始化连接大小
      initial-size: 5
      # 最小空闲连接数
      min-idle: 5
      # 最大连接数
      max-active: 50
      # 配置获取连接等待超时的时间(毫秒)
      max-wait: 10000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位毫秒
      min-evictable-idle-time-millis: 300000
      # 用来检测连接是否有效的sql
      validation-query: SELECT 1
      # 建议配置为true，不影响性能，并且保证安全性
      test-while-idle: true
      # 申请连接时执行validationQuery检测连接是否有效
      test-on-borrow: false
      # 归还连接时执行validationQuery检测连接是否有效
      test-on-return: false
      # 是否缓存preparedStatement，也就是PSCache
      pool-prepared-statements: true
      # 要启用PSCache，必须配置大于0
      max-pool-prepared-statement-per-connection-size: 20
      # 配置监控统计拦截的filters，去掉后监控界面sql无法统计，'wall'用于防火墙
      filters: stat,wall
      # 通过connectProperties属性来打开mergeSql功能；慢SQL记录
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000


  data:
    # Redis数据库配置
    redis:
      host: ${smart.enjoy.suiyuan.data.redis.host}
      port: ${smart.enjoy.suiyuan.data.redis.port}
      password: ${smart.enjoy.suiyuan.data.redis.password}
      connect-timeout: 5000
      lettuce:
        pool:
          enabled: true         # 启用连接池
          max-active: 8         # 最大连接数
          max-idle: 4           # 最大空闲连接
          min-idle: 2           # 最小空闲连接
          max-wait: 5000        # 获取连接最大等待时间
# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:com/shxy/suiyuanserver/mapper/*.xml
  type-aliases-package: com.shxy.suiyuanentity.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
# 日志配置
logging:
  config: classpath:logback-spring.xml
# 腾讯云存储配置
smart:
  enjoy:
    suiyuan:
      tencent:
        secret-id: ${smart.enjoy.suiyuan.tencent.cos.secret-id}
        secret-key: ${smart.enjoy.suiyuan.tencent.cos.secret-key}
        region: ${smart.enjoy.suiyuan.tencent.cos.region}
        bucket-name: ${smart.enjoy.suiyuan.tencent.cos.bucket-name}
        avatar-dir: ${smart.enjoy.suiyuan.tencent.cos.avatar-dir}
        image-dir: ${smart.enjoy.suiyuan.tencent.cos.image-dir}
      # API限流配置
      rate-limit:
        enabled: true
        default:
          requests: 100
          window-seconds: 60

# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.xiaominfo.knife4j.demo.web
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: ${KNIFE4J_ENABLE:true}
  setting:
    language: zh_cn